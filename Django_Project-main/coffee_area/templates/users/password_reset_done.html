<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
    <title>Письмо отправлено</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center;">
                <i class="fas fa-envelope" style="font-size: 60px; color: #d4a373; margin-bottom: 20px;"></i>
            </div>
            <h1 class="auth-title">Проверьте почту</h1>
            <p class="auth-subtitle">
                Мы отправили инструкцию по восстановлению пароля на ваш email.<br>
                Если письмо не пришло, проверьте папку "Спам".
            </p>
            
            <div class="auth-links" style="margin-top: 30px;">
                <p><a href="{% url 'users:login' %}"><i class="fas fa-arrow-left"></i> Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
</body>
</html>
