<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
    <title>Пароль изменен</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center;">
                <i class="fas fa-check-circle" style="font-size: 60px; color: #28a745; margin-bottom: 20px;"></i>
            </div>
            <h1 class="auth-title">Пароль изменен!</h1>
            <p class="auth-subtitle">
                Ваш пароль был успешно изменен.<br>
                Теперь вы можете войти в систему с новым паролем.
            </p>
            
            <div class="auth-links" style="margin-top: 30px;">
                <p><a href="{% url 'users:login' %}" class="btn btn-primary" style="display: inline-block; padding: 12px 30px;">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </a></p>
            </div>
        </div>
    </div>
</body>
</html>
